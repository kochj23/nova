# nova_scheduler.yaml — Unified task scheduler for Nova
# One persistent daemon replaces 30+ fragile launchd StartInterval/Calendar jobs.
#
# Schedule types:
#   every: "5m", "4h", "30s"         — interval-based
#   cron:  "0 23 * * *"              — standard 5-field cron (min hr day mon dow)
#
# Overlap:
#   skip  — if already running, skip this cycle (default)
#   queue — wait for current to finish, then run once
#
# Written by Jordan Koch.

scheduler:
  tick_interval: 1
  max_concurrent: 6
  status_port: 37460
  heartbeat_interval: 3600
  stale_threshold: 2.0
  python: /opt/homebrew/bin/python3
  shell: /bin/zsh
  tz: America/Los_Angeles

slack:
  channel: C0ATAF7NZG9
  alerts: true
  heartbeat: true
  startup: true

tasks:

  # ── Every 5 minutes ─────────────────────────────────────────────────────

  protect_monitor:
    script: nova_protect_monitor.py
    schedule: every 5m
    timeout: 120
    overlap: skip

  app_watchdog:
    script: nova_app_watchdog.py
    schedule: every 5m
    timeout: 60
    overlap: skip

  sky_watcher:
    script: nova_sky_watcher.py
    schedule: every 10m
    timeout: 90
    overlap: skip

  imessage_watch:
    script: nova_imessage.py
    schedule: every 10m
    timeout: 30
    overlap: skip

  watchdog:
    script: nova_watchdog.py
    schedule: every 5m
    timeout: 60
    overlap: skip

  # ── Every 10 minutes ────────────────────────────────────────────────────

  subagent_health:
    script: nova_subagent_ctl.sh
    args: ["health"]
    schedule: every 10m
    timeout: 30
    overlap: skip

  mail_agent:
    script: nova_mail_agent.py
    schedule: every 10m
    timeout: 300
    overlap: skip

  proactive_peace:
    script: nova_proactive_peace.py
    schedule: every 15m
    timeout: 60
    overlap: skip

  gateway_watchdog:
    script: nova_gateway_watchdog.sh
    schedule: every 10m
    timeout: 60
    overlap: skip
    enabled: false  # Absorbed into nova_watchdog.py

  # ── Every 15-30 minutes ────────────────────────────────────────────────

  face_recognition:
    script: nova_face_recognition.py
    schedule: every 30m
    timeout: 120
    overlap: skip

  home_watchdog:
    script: nova_home_watchdog.py
    schedule: every 30m
    timeout: 60
    overlap: skip

  synology_monitor:
    script: nova_synology_monitor.py
    schedule: every 30m
    timeout: 60
    overlap: skip

  unifi_monitor:
    script: nova_unifi_monitor.py
    schedule: every 30m
    timeout: 60
    overlap: skip

  # ── Every 1-4 hours ────────────────────────────────────────────────────

  session_watchdog:
    script: nova_session_reset.sh
    args: ["--threshold", "12"]
    schedule: every 1h
    timeout: 30
    overlap: skip

  ollama_preload:
    script: nova_ollama_preload.sh
    schedule: every 4h
    timeout: 120
    overlap: skip

  reddit_ingest:
    script: nova_reddit_ingest.py
    schedule: every 4h
    timeout: 3600
    overlap: skip

  # ── Daily: overnight (heavy compute, staggered) ────────────────────────

  pg_backup:
    script: nova_pg_backup.sh
    schedule: cron 0 2 * * *
    timeout: 10800
    overlap: queue

  dream_pipeline:
    script: dream_generate.py
    schedule: cron 0 5 * * *
    timeout: 900
    overlap: skip
    group: llm

  agent_gardener:
    script: nova_agent_gardener.py
    args: ["--cron"]
    schedule: cron 0 3 * * *
    timeout: 3600
    overlap: skip
    group: llm

  log_rotate:
    script: nova_log_rotate.py
    schedule: cron 30 3 * * *
    timeout: 120
    overlap: skip

  # ── Daily: morning (Jordan wakes up) ───────────────────────────────────

  health_check:
    script: nova_health_check.py
    schedule: cron 45 6 * * *
    timeout: 120
    overlap: skip

  morning_brief:
    script: nova_morning_brief.py
    schedule: cron 0 7 * * *
    timeout: 300
    overlap: skip

  goal_check:
    script: nova_goal_check.py
    schedule: cron 5 7 * * *
    timeout: 120
    overlap: skip

  # ── Daily: post-wake (verification, enrichment) ────────────────────────

  dead_mans_switch:
    script: nova_dead_mans_switch.py
    schedule: cron 15 9 * * *
    timeout: 120
    overlap: skip

  sam_blog_ingest:
    script: nova_sam_blog_ingest.py
    schedule: cron 30 9 * * *
    timeout: 120
    overlap: skip

  # ── Daily: daytime (enrichment, reflection) ────────────────────────────

  mail_deliver_midday:
    script: nova_mail_deliver.py
    schedule: cron 0 12 * * *
    timeout: 120
    overlap: skip

  context_bridge_am:
    script: nova_context_bridge.py
    schedule: cron 0 10 * * *
    timeout: 120
    overlap: skip

  this_day:
    script: nova_this_day.py
    schedule: cron 0 15 * * *
    timeout: 180
    overlap: skip

  context_bridge_pm:
    script: nova_context_bridge.py
    schedule: cron 0 16 * * *
    timeout: 120
    overlap: skip

  # ── Daily: evening (wrap-up) ───────────────────────────────────────────

  mail_deliver_pm:
    script: nova_mail_deliver.py
    schedule: cron 0 18 * * *
    timeout: 120
    overlap: skip

  daily_journal:
    script: nova_daily_journal.py
    schedule: cron 0 21 * * *
    timeout: 300
    overlap: skip
    group: llm

  # ── Daily: night (digests, reports) ────────────────────────────────────

  nightly_report:
    script: nova_nightly_report.py
    schedule: cron 0 23 * * *
    timeout: 600
    overlap: skip

  nightly_synology:
    script: nova_nightly_synology.py
    schedule: cron 20 23 * * *
    timeout: 300
    overlap: skip

  nightly_protect:
    script: nova_nightly_protect.py
    schedule: cron 40 23 * * *
    timeout: 300
    overlap: skip

  bandwidth_report:
    script: nova_bandwidth_report.py
    schedule: cron 50 23 * * *
    timeout: 120
    overlap: skip

  # ── Plex Integration ───────────────────────────────────────────────────

  plex_playing:
    script: nova_plex.py
    args: ["playing"]
    schedule: every 5m
    timeout: 30
    overlap: skip

  plex_history:
    script: nova_plex.py
    args: ["history"]
    schedule: cron 10 7 * * *
    timeout: 120
    overlap: skip

  plex_mood:
    script: nova_plex.py
    args: ["mood"]
    schedule: cron 15 7 * * *
    timeout: 60
    overlap: skip

  plex_filmschool:
    script: nova_plex.py
    args: ["filmschool"]
    schedule: cron 20 7 * * *
    timeout: 120
    overlap: skip
    group: llm

  plex_velocity:
    script: nova_plex.py
    args: ["velocity"]
    schedule: cron 0 1 * * *
    timeout: 60
    overlap: skip

  plex_ondeck:
    script: nova_plex.py
    args: ["ondeck"]
    schedule: cron 30 19 * * *
    timeout: 60
    overlap: skip

  plex_recommend:
    script: nova_plex.py
    args: ["recommend"]
    schedule: cron 0 19 * * 5
    timeout: 120
    overlap: skip

  plex_guest:
    script: nova_plex.py
    args: ["guest"]
    schedule: every 5m
    timeout: 30
    overlap: skip

  plex_rewatch:
    script: nova_plex.py
    args: ["rewatch"]
    schedule: cron 0 10 * * 0
    timeout: 60
    overlap: skip

  # ── Weekly ─────────────────────────────────────────────────────────────

  weekly_journal:
    script: nova_weekly_journal.py
    schedule: cron 0 17 * * 0
    timeout: 120
    overlap: skip

  self_audit:
    script: nova_self_audit.py
    schedule: cron 30 17 * * 0
    timeout: 60
    overlap: skip

  weekly_reliability:
    script: nova_weekly_reliability.py
    schedule: cron 0 22 * * 0
    timeout: 120
    overlap: skip

  plex_stats:
    script: nova_plex.py
    args: ["stats"]
    schedule: cron 0 18 * * 0
    timeout: 120
    overlap: skip

  plex_shame:
    script: nova_plex.py
    args: ["shame"]
    schedule: cron 30 18 * * 0
    timeout: 60
    overlap: skip

  plex_seasonal:
    script: nova_plex.py
    args: ["seasonal"]
    schedule: cron 0 10 1 * *
    timeout: 60
    overlap: skip

  plex_sync:
    script: nova_plex.py
    args: ["sync"]
    schedule: cron 0 4 * * 1
    timeout: 300
    overlap: skip

  # ── Live TV (HDHomeRun) ────────────────────────────────────────────────

  livetv_whats_on:
    script: nova_livetv.py
    args: ["whats-on"]
    schedule: every 15m
    timeout: 30
    overlap: skip

  livetv_breaking:
    script: nova_livetv.py
    args: ["breaking"]
    schedule: every 15m
    timeout: 180
    overlap: skip

  livetv_news:
    script: nova_livetv.py
    args: ["news"]
    schedule: cron 5 7 * * *
    timeout: 1200
    overlap: skip

  livetv_dream_surf:
    script: nova_livetv.py
    args: ["dream-surf"]
    schedule: cron 0 4 * * *
    timeout: 600
    overlap: skip

  livetv_gameshow:
    script: nova_livetv.py
    args: ["gameshow"]
    schedule: cron 0 19 * * 1-5
    timeout: 2400
    overlap: skip
    group: llm

  livetv_ambiance:
    script: nova_livetv.py
    args: ["ambiance"]
    schedule: cron 0 8,12,16,20 * * *
    timeout: 300
    overlap: skip

  livetv_novas_time:
    script: nova_livetv.py
    args: ["novas-time"]
    schedule: cron 30 22 * * *
    timeout: 1200
    overlap: skip
    group: llm

  # ── Disabled ───────────────────────────────────────────────────────────

  agent_briefer:
    script: nova_agent_briefer.py
    args: ["--cron"]
    schedule: cron 5 7 * * *
    timeout: 300
    overlap: skip
    enabled: false  # Disabled: duplicates morning_brief, hallucinates with deepseek-r1:8b

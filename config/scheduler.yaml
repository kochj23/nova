    timeout: 120
    overlap: skip

  watchdog:
    script: nova_watchdog.py
    schedule: every 5m
    timeout: 60
    overlap: skip
    enabled: false  # Replaced by Big Brother (net.digitalnoise.big-brother launchd)

  # ── Every 10 minutes ────────────────────────────────────────────────────

  subagent_health:
    script: nova_subagent_ctl.sh

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alert Rules — Nova Control</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <style>
    .alerts-container { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
    .section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 24px 0 12px; }
    .rules-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 6px; overflow: hidden; }
    .rules-table th { padding: 8px 12px; text-align: left; font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; border-bottom: 1px solid var(--border-glow); }
    .rules-table td { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); border-bottom: 1px solid rgba(255,255,255,0.02); }
    .rules-table tr:last-child td { border-bottom: none; }
    .rule-enabled { color: var(--accent-green); }
    .rule-disabled { color: var(--text-dim); }
    .severity-badge { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .severity-badge.critical { background: rgba(255,51,68,0.2); color: var(--accent-red); }
    .severity-badge.warning { background: rgba(255,204,0,0.2); color: var(--accent-yellow); }
    .severity-badge.info { background: rgba(0,255,200,0.1); color: var(--accent-cyan); }
    .action-btn {
      padding: 2px 8px; font-size: 10px; border: 1px solid var(--border-glow);
      background: transparent; color: var(--text-dim); border-radius: 3px; cursor: pointer; margin: 0 2px;
    }
    .action-btn:hover { color: var(--accent-cyan); border-color: var(--accent-cyan); }
    .action-btn.delete:hover { color: var(--accent-red); border-color: var(--accent-red); }
    .create-form {
      background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 6px;
      padding: 16px 20px; margin-bottom: 20px;
    }
    .form-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .form-input {
      padding: 5px 10px; font-size: 12px; background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-glow); border-radius: 3px; color: var(--text-primary);
      font-family: var(--font-mono);
    }
    .form-input:focus { outline: none; border-color: var(--accent-cyan); }
    .form-label { font-size: 11px; color: var(--text-dim); min-width: 60px; }
    .form-select { padding: 5px 10px; font-size: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glow); border-radius: 3px; color: var(--text-primary); }
    .submit-btn {
      padding: 6px 16px; font-size: 12px; border: 1px solid var(--accent-cyan);
      background: rgba(0,255,200,0.1); color: var(--accent-cyan); border-radius: 3px; cursor: pointer;
    }
    .history-item {
      padding: 8px 12px; border-bottom: 1px solid var(--border-glow); font-size: 12px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-time { color: var(--text-dim); font-size: 11px; }
    .history-rule { color: var(--accent-cyan); font-weight: 600; }
    .empty-state { text-align: center; padding: 30px; color: var(--text-dim); font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>ALERT RULES</h1>
      <span class="header-subtitle">anomaly detection &amp; alerting</span>
    </div>
    <div class="header-right">
      <a href="/" style="font-size:11px;color:var(--text-dim);text-decoration:none;padding:3px 10px;border:1px solid var(--border-glow);border-radius:3px;">Dashboard</a>
      <a href="/sla" style="font-size:11px;color:var(--text-dim);text-decoration:none;padding:3px 10px;border:1px solid var(--border-glow);border-radius:3px;">SLA</a>
      <a href="/incidents" style="font-size:11px;color:var(--text-dim);text-decoration:none;padding:3px 10px;border:1px solid var(--border-glow);border-radius:3px;">Incidents</a>
    </div>
  </header>

  <div class="alerts-container">
    <div class="section-title">Create Rule</div>
    <div class="create-form">
      <div class="form-row">
        <span class="form-label">Name</span>
        <input class="form-input" id="rule-name" placeholder="High CPU Alert" style="width:200px">
        <span class="form-label">Metric</span>
        <select class="form-select" id="rule-metric">
          <option value="cpu_percent">CPU %</option>
          <option value="memory_percent">Memory %</option>
          <option value="ingest_queue">Ingest Queue</option>
          <option value="latency:ollama">Latency: Ollama</option>
          <option value="latency:tinychat">Latency: TinyChat</option>
          <option value="latency:mlx_chat">Latency: MLX</option>
          <option value="latency:openwebui">Latency: OpenWebUI</option>
        </select>
      </div>
      <div class="form-row">
        <span class="form-label">Condition</span>
        <select class="form-select" id="rule-condition">
          <option value="gt">Greater than</option>
          <option value="lt">Less than</option>
          <option value="zscore">Z-score (anomaly)</option>
        </select>
        <span class="form-label">Threshold</span>
        <input class="form-input" id="rule-threshold" type="number" value="90" style="width:80px">
        <span class="form-label">Window</span>
        <input class="form-input" id="rule-window" type="number" value="60" style="width:60px">
        <span class="form-label" style="min-width:auto">min</span>
      </div>
      <div class="form-row">
        <span class="form-label">Severity</span>
        <select class="form-select" id="rule-severity">
          <option value="warning">Warning</option>
          <option value="critical">Critical</option>
        </select>
        <label style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="rule-slack" checked> Slack notify
        </label>
        <button class="submit-btn" onclick="createRule()">Create Rule</button>
      </div>
    </div>

    <div class="section-title">Active Rules</div>
    <table class="rules-table">
      <thead><tr><th>Name</th><th>Metric</th><th>Condition</th><th>Threshold</th><th>Window</th><th>Severity</th><th>Status</th><th>Last Triggered</th><th>Actions</th></tr></thead>
      <tbody id="rules-body"><tr><td colspan="9" class="empty-state">Loading...</td></tr></tbody>
    </table>

    <div class="section-title" style="margin-top:32px">Alert History</div>
    <div id="alert-history" style="background:var(--bg-card);border:1px solid var(--border-glow);border-radius:6px;max-height:300px;overflow-y:auto">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <script>
    const esc = s => typeof s === "string" ? s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : s;
    async function loadRules() {
      try {
        const res = await fetch('/api/alerts/rules');
        const rules = await res.json();
        renderRules(rules);
      } catch (e) {
        document.getElementById('rules-body').innerHTML = '<tr><td colspan="9" class="empty-state">Failed to load rules</td></tr>';
      }
    }

    function renderRules(rules) {
      const tbody = document.getElementById('rules-body');
      if (!rules.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No alert rules configured. Create one above.</td></tr>';
        return;
      }
      tbody.innerHTML = rules.map(r => {
        const lastTriggered = r.last_triggered_at ? new Date(r.last_triggered_at).toLocaleString() : 'Never';
        return `<tr>
          <td style="color:var(--text-primary);font-weight:600">${escapeHtml(r.name)}</td>
          <td><code style="font-size:11px">${escapeHtml(r.metric)}</code></td>
          <td>${r.condition}</td>
          <td>${r.threshold}</td>
          <td>${r.window_minutes}m</td>
          <td><span class="severity-badge ${r.severity}">${r.severity}</span></td>
          <td class="${r.enabled ? 'rule-enabled' : 'rule-disabled'}">${r.enabled ? 'Active' : 'Disabled'}</td>
          <td style="font-size:10px;color:var(--text-dim)">${lastTriggered}</td>
          <td>
            <button class="action-btn" onclick="toggleRule('${r.id}', ${!r.enabled})">${r.enabled ? 'Disable' : 'Enable'}</button>
            <button class="action-btn delete" onclick="deleteRule('${r.id}')">Delete</button>
          </td>
        </tr>`;
      }).join('');
    }

    async function createRule() {
      const body = {
        name: document.getElementById('rule-name').value,
        metric: document.getElementById('rule-metric').value,
        condition: document.getElementById('rule-condition').value,
        threshold: parseFloat(document.getElementById('rule-threshold').value),
        window_minutes: parseInt(document.getElementById('rule-window').value),
        severity: document.getElementById('rule-severity').value,
        slack_notify: document.getElementById('rule-slack').checked,
      };
      if (!body.name) { alert('Name required'); return; }
      await fetch('/api/alerts/rules', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
      document.getElementById('rule-name').value = '';
      loadRules();
    }

    async function toggleRule(id, enabled) {
      await fetch(`/api/alerts/rules/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({enabled}) });
      loadRules();
    }

    async function deleteRule(id) {
      if (!confirm('Delete this rule?')) return;
      await fetch(`/api/alerts/rules/${id}`, { method: 'DELETE' });
      loadRules();
    }

    async function loadHistory() {
      try {
        const res = await fetch('/api/alerts/history');
        const data = await res.json();
        const el = document.getElementById('alert-history');
        if (!data.length) {
          el.innerHTML = '<div class="empty-state">No alerts triggered yet.</div>';
          return;
        }
        el.innerHTML = data.map(h => {
          const detail = h.detail || {};
          return `<div class="history-item">
            <span class="history-time">${h.ts ? new Date(h.ts).toLocaleString() : '?'}</span>
            <span class="history-rule">${escapeHtml(detail.rule || '?')}</span>
            <span style="color:var(--text-secondary)"> ${escapeHtml(detail.metric || '')} = ${detail.value} (threshold: ${detail.threshold})</span>
          </div>`;
        }).join('');
      } catch (e) {
        document.getElementById('alert-history').innerHTML = '<div class="empty-state">Failed to load history</div>';
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    loadRules();
    loadHistory();
    setInterval(loadRules, 30000);
    setInterval(loadHistory, 30000);
  </script>
<script src="/nav-bar.js"></script>
</body>
</html>

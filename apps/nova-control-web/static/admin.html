<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Nova Control</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <style>
    .admin-container { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
    .section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 24px 0 12px; }
    .admin-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 6px; overflow: hidden; }
    .admin-table th { padding: 8px 12px; text-align: left; font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; border-bottom: 1px solid var(--border-glow); }
    .admin-table td { padding: 8px 12px; font-size: 12px; color: var(--text-secondary); border-bottom: 1px solid rgba(255,255,255,0.02); }
    .admin-table tr:last-child td { border-bottom: none; }
    .role-badge { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .role-badge.admin { background: rgba(255,0,128,0.2); color: var(--accent-magenta); }
    .role-badge.operator { background: rgba(0,255,200,0.1); color: var(--accent-cyan); }
    .role-badge.viewer { background: rgba(255,255,255,0.05); color: var(--text-dim); }
    .action-btn {
      padding: 2px 8px; font-size: 10px; border: 1px solid var(--border-glow);
      background: transparent; color: var(--text-dim); border-radius: 3px; cursor: pointer;
    }
    .action-btn:hover { color: var(--accent-cyan); border-color: var(--accent-cyan); }
    .action-btn.delete:hover { color: var(--accent-red); border-color: var(--accent-red); }
    .create-form {
      background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 6px;
      padding: 16px 20px; margin-bottom: 20px;
    }
    .form-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .form-input {
      padding: 5px 10px; font-size: 12px; background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-glow); border-radius: 3px; color: var(--text-primary);
      font-family: var(--font-mono);
    }
    .form-input:focus { outline: none; border-color: var(--accent-cyan); }
    .form-select { padding: 5px 10px; font-size: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glow); border-radius: 3px; color: var(--text-primary); }
    .form-label { font-size: 11px; color: var(--text-dim); min-width: 60px; }
    .submit-btn {
      padding: 6px 16px; font-size: 12px; border: 1px solid var(--accent-cyan);
      background: rgba(0,255,200,0.1); color: var(--accent-cyan); border-radius: 3px; cursor: pointer;
    }
    .audit-list { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 6px; max-height: 400px; overflow-y: auto; }
    .audit-item { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 12px; }
    .audit-item:last-child { border-bottom: none; }
    .audit-ts { color: var(--text-dim); font-size: 10px; }
    .audit-user { color: var(--accent-cyan); font-weight: 600; margin: 0 6px; }
    .audit-action { color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 30px; color: var(--text-dim); font-size: 12px; }
    .auth-required { text-align: center; padding: 60px 20px; }
    .auth-required h2 { color: var(--accent-red); margin-bottom: 12px; }
    .auth-required a { color: var(--accent-cyan); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>ADMIN PANEL</h1>
      <span class="header-subtitle">user management &amp; audit log</span>
    </div>
    <div class="header-right">
      <a href="/" style="font-size:11px;color:var(--text-dim);text-decoration:none;padding:3px 10px;border:1px solid var(--border-glow);border-radius:3px;">Dashboard</a>
      <span id="user-info" style="font-size:11px;color:var(--text-dim)"></span>
    </div>
  </header>

  <div class="admin-container" id="main-content">
    <div class="section-title">Create User</div>
    <div class="create-form">
      <div class="form-row">
        <span class="form-label">Username</span>
        <input class="form-input" id="new-username" placeholder="username" style="width:160px">
        <span class="form-label">Password</span>
        <input class="form-input" id="new-password" type="password" placeholder="password" style="width:160px">
        <span class="form-label">Role</span>
        <select class="form-select" id="new-role">
          <option value="viewer">Viewer</option>
          <option value="operator">Operator</option>
          <option value="admin">Admin</option>
        </select>
        <button class="submit-btn" onclick="createUser()">Create User</button>
      </div>
    </div>

    <div class="section-title">Users</div>
    <table class="admin-table">
      <thead><tr><th>Username</th><th>Role</th><th>Created</th><th>Last Login</th><th>Actions</th></tr></thead>
      <tbody id="users-body"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody>
    </table>

    <div class="section-title" style="margin-top:32px">Audit Log</div>
    <div class="audit-list" id="audit-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <script>
    const esc = s => typeof s === "string" ? s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : s;
    function getToken() { return localStorage.getItem('nova_token'); }

    function authHeaders() {
      const t = getToken();
      return t ? {'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json'} : {'Content-Type': 'application/json'};
    }

    async function checkAuth() {
      const res = await fetch('/api/auth/me', {headers: authHeaders()});
      const data = await res.json();
      if (!data.authenticated || data.role !== 'admin') {
        document.getElementById('main-content').innerHTML = `
          <div class="auth-required">
            <h2>Admin access required</h2>
            <p style="color:var(--text-dim)">You must be logged in as an admin to access this page.</p>
            <p><a href="/login">Go to Login</a></p>
          </div>`;
        return false;
      }
      document.getElementById('user-info').textContent = `Logged in as: ${data.username} (${data.role})`;
      return true;
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users', {headers: authHeaders()});
        if (res.status === 403) { checkAuth(); return; }
        const users = await res.json();
        renderUsers(users);
      } catch (e) {}
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-body');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No users found. Create the first admin user.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `<tr>
        <td style="color:var(--text-primary);font-weight:600">${escapeHtml(u.username)}</td>
        <td><span class="role-badge ${u.role}">${u.role}</span></td>
        <td style="font-size:10px;color:var(--text-dim)">${u.created_at ? new Date(u.created_at).toLocaleDateString() : '?'}</td>
        <td style="font-size:10px;color:var(--text-dim)">${u.last_login ? new Date(u.last_login).toLocaleString() : 'Never'}</td>
        <td><button class="action-btn delete" onclick="deleteUser('${u.id}','${u.username}')">Delete</button></td>
      </tr>`).join('');
    }

    async function createUser() {
      const body = {
        username: document.getElementById('new-username').value,
        password: document.getElementById('new-password').value,
        role: document.getElementById('new-role').value,
      };
      if (!body.username || !body.password) { alert('Username and password required'); return; }
      const res = await fetch('/api/admin/users', {method: 'POST', headers: authHeaders(), body: JSON.stringify(body)});
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      document.getElementById('new-username').value = '';
      document.getElementById('new-password').value = '';
      loadUsers();
      loadAudit();
    }

    async function deleteUser(id, username) {
      if (!confirm(`Delete user "${username}"?`)) return;
      await fetch(`/api/admin/users/${id}`, {method: 'DELETE', headers: authHeaders()});
      loadUsers();
      loadAudit();
    }

    async function loadAudit() {
      try {
        const res = await fetch('/api/admin/audit', {headers: authHeaders()});
        if (res.status === 403) return;
        const data = await res.json();
        const el = document.getElementById('audit-list');
        if (!data.length) {
          el.innerHTML = '<div class="empty-state">No audit entries yet.</div>';
          return;
        }
        el.innerHTML = data.map(a => `<div class="audit-item">
          <span class="audit-ts">${a.ts ? new Date(a.ts).toLocaleString() : '?'}</span>
          <span class="audit-user">${escapeHtml(a.username || 'system')}</span>
          <span class="audit-action">${escapeHtml(a.action)} ${a.detail ? JSON.stringify(a.detail) : ''}</span>
        </div>`).join('');
      } catch (e) {}
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    async function init() {
      const ok = await checkAuth();
      if (ok) {
        loadUsers();
        loadAudit();
      }
    }
    init();
  </script>
<script src="/nav-bar.js"></script>
</body>
</html>
